name: Deploy to GitHub Pages

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_link_checker:
        description: 'Run link checker'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set deployment config
        id: config
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "destination_dir=" >> $GITHUB_OUTPUT
            echo "site_url=https://${REPO_OWNER}.github.io/${REPO_NAME}/" >> $GITHUB_OUTPUT
          else
            SAFE_BRANCH=$(echo "$BRANCH" | sed 's/\//-/g')
            echo "destination_dir=preview/${SAFE_BRANCH}" >> $GITHUB_OUTPUT
            echo "site_url=https://${REPO_OWNER}.github.io/${REPO_NAME}/preview/${SAFE_BRANCH}/" >> $GITHUB_OUTPUT
          fi

      - name: Configure site URL
        run: |
          sed -i "s|^site_url:.*|site_url: ${{ steps.config.outputs.site_url }}|" mkdocs.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Link Checker
        if: github.event_name != 'workflow_dispatch' || inputs.run_link_checker != false
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --accept 200,401,403 --exclude-all-private --insecure --remap "https://console-openshift-console.apps-crc.testing https://google.com" './site/**/*.html'
          fail: false

      - name: Audit site with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8000/
          staticDistDir: ./site
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: ${{ steps.config.outputs.destination_dir }}
          keep_files: true
