# Project information
site_name: ChefBC.com
#site_url: https://squidfunk.github.io/mkdocs-material/
site_url: https://chefbc.com
site_author: Martin Donath
site_description: >-
  Write your documentation in Markdown and create a professional static site in
  minutes – searchable, customizable, in 60+ languages, for all devices

# Repository
#repo_name: squidfunk/mkdocs-material
#repo_url: https://github.com/squidfunk/mkdocs-material

# Copyright
copyright: chefbc.com Copyright &copy; 2026 | All Rights Reserved

# Configuration
theme:
  name: material
  # custom_dir: material/overrides
  custom_dir: overrides
  #custom_dir: docs/overrides
  # custom_dir: src/overrides
  #extra_css:
  # - stylesheets/extra.css
  #  - src/overrides/assets/stylesheets/custom.scss
  #extra_javascript:
  #  - javascripts/extra.js
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Chelsea Market
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # - minify:
  #     minify_html: true
  - glightbox:  # Lightbox plugin for images
      touchNavigation: true
      loop: true
      keyboardNavigation: true
      closeButton: true
      drag: true
      openEffect: 'fade'
      closeEffect: 'fade'
  # - image-gallery:  # Disabled due to bug (issue #3) - using custom hook instead
  #     image_folder: "downloads"
  #     separate_category_pages: false

# Watch additional directories for live reloading
watch:
  - overrides
  - docs

# Hooks
hooks:
  - overrides/hooks/blog_posts.py
  - overrides/hooks/reviews.py
  - overrides/hooks/gallery.py
  - overrides/hooks/contact_form.py
#   - material/overrides/hooks/shortcodes.py
#   - material/overrides/hooks/translations.py

# Additional configuration
extra:
  # Contact form: subject is hidden from user but sent with submission (for email subject line)
  contact_form:
    subject: "ChefBC.com – New Contact Form Submission"
  branding:
    header_logo: assets/images/bc.png
    header_logo_alt: ChefBC.com
    hero_emoji: assets/images/bc.png
    hero_emoji_alt: Chef BC
    # hero_background: assets/images/img/computer.jpg
    hero_background: assets/images/img/aryan-dhiman-iGLLtLINSkw-unsplash.jpg
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/squidfunk
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/squidfunk/mkdocs-material/
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mkdocs-material/
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@squidfunk
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/squidfunk
  # Announcement bar configuration
  # Set enabled: false to hide the announcement bar
  # Use 'text' for plain text, or 'html' for rich HTML content
  announcement:
    enabled: true
    # Simple text announcement
    # text: "Welcome to ChefBC.com! Check out our latest updates."
    # Or use HTML for rich content with links and icons
    # Note: HTML only, Jinja2 templates won't work here
    html: >
      <strong>Welcome!</strong> Check out our latest updates on
      <a href="https://github.com/chefbc">GitHub</a>
  generator: false

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde


