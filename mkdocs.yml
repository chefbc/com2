# Project information
site_name: Speckless Auto Spa
#site_url: https://squidfunk.github.io/mkdocs-material/
site_url: https://specklessauto.com
site_author: Speckless Auto Spa
site_description: >-
  Your vehicle preservation and restoration specialists in Waukesha, WI. Get a showroom shine every time.

# Repository
#repo_name: squidfunk/mkdocs-material
#repo_url: https://github.com/squidfunk/mkdocs-material

# Copyright
copyright: Speckless Auto Spa &copy; 2026 | All Rights Reserved

# Configuration
theme:
  name: material
  # custom_dir: material/overrides
  custom_dir: overrides
  #custom_dir: docs/overrides
  # custom_dir: src/overrides
  #extra_css:
  # - stylesheets/extra.css
  #  - src/overrides/assets/stylesheets/custom.scss
  #extra_javascript:
  #  - javascripts/extra.js
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # - minify:
  #     minify_html: true
  - glightbox:  # Lightbox plugin for images
      touchNavigation: true
      loop: true
      keyboardNavigation: true
      closeButton: true
      drag: true
      openEffect: 'fade'
      closeEffect: 'fade'
  # - image-gallery:  # Disabled due to bug (issue #3) - using custom hook instead
  #     image_folder: "downloads"
  #     separate_category_pages: false

# Watch additional directories for live reloading
watch:
  - overrides
  - docs

# Hooks
hooks:
  - overrides/hooks/front_matter.py
  - overrides/hooks/blog_posts.py
  - overrides/hooks/reviews.py
  - overrides/hooks/notification_section.py
  - overrides/hooks/gallery.py
  - overrides/hooks/contact_form.py
#   - material/overrides/hooks/shortcodes.py
#   - material/overrides/hooks/translations.py

# Additional configuration
extra:
  # Footer prev/next nav: set to false to hide the "Previous / Next" links (md-footer__inner)
  footer_nav_visible: true
  # Business / contact details (for contact page, footer, etc.)
  business:
    email: specklessas@gmail.com
    phone: "262-218-2794"
    address: "S34W29939 Little John Dr. # 4, Waukesha, WI 53189"
    hours: "Mon - Fri: 9:00 AM - 5:00 PM"
    # Google Maps: must be the EMBED URL (iframe src), not a share link.
    # Get it: Google Maps → your place → Share → "Embed a map" tab → copy the iframe src (starts with https://www.google.com/maps/embed?pb=...).
    # Share links (maps.app.goo.gl/...) do not work in iframes; until you set the embed URL, a "View on Google Maps" link is shown.
    google_map_embed_id: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2918.9050766385694!2d-88.34737228803604!3d42.980273171021594!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8804ff9da3be63e5%3A0x5cfa18e05992e8b7!2sSpeckless%20Auto%20Spa!5e0!3m2!1sen!2sus!4v1769878437091!5m2!1sen!2sus"
  # Contact form: subject is hidden from user but sent with submission (for email subject line)
  contact_form:
    subject: "Speckless Auto Spa – New Contact Form Submission"
  # Branding: paths relative to docs/. For stock imagery (hero/notification), use Pexels and add to docs/assets/ then set path here or in notification.md.
  branding:
    header_logo: assets/Horizontal-Color-Speckless-Auto-Spa-Logo-2024.png
    header_logo_alt: Speckless Auto Spa
    hero_emoji: assets/RGB-Square-Color-Speckless-Auto-Spa-Logo-2024-300x255.webp
    hero_emoji_alt: Speckless Auto Spa
    hero_background: assets/Speckless_bg1_overlay.jpg
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/squidfunk
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/squidfunk/mkdocs-material/
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mkdocs-material/
    - icon: fontawesome/brands/mastodon
      link: https://fosstodon.org/@squidfunk
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/squidfunk
  # Gallery (gallery page): show or hide image descriptions (captions) under each image
  gallery:
    show_descriptions: false
  # Announcement bar configuration
  # Set enabled: false to hide the announcement bar
  # Use 'text' for plain text, or 'html' for rich HTML content
  announcement:
    enabled: true
    # Optional: bar colors (amber for Speckless brand)
    background: "#e65100"
    color: "#fff"
    html: >
      <strong>When clean isn't enough, go with Speckless.</strong>
      <a href="contact/">Book your service</a> or <a href="packages/">see our packages</a>.
  generator: false

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde


# Page tree – Speckless Auto Spa
nav:
  - Home: index.md
  - Who we are: who-we-are.md
  - Services:
    - Ceramic Coating: services/ceramic-coating/ceramic.md
    - Paint correction: services/paint-correction.md
    - Detailing:
      - Full packages: services/detailing-packages/index.md
      - Exterior: services/detailing-packages/exterior.md
      - Interior: services/detailing-packages/interior.md
      - Engine bay: services/detailing-packages/engine.md
      - Custom: services/detailing-packages/custom.md
  - Packages: packages.md
  - Gallery: gallery.md
  - Reviews: reviews/reviews.md
  - Contact: contact.md



